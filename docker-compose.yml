services:
  postgres:
    image: postgres:16
    container_name: legalmove-postgres
    environment:
      POSTGRES_USER: legalmove
      POSTGRES_PASSWORD: legalmove
      POSTGRES_DB: legalmove
    ports:
      - "5432:5432"
    volumes:
      - legalmove_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalmove -d legalmove"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  legalmove_pg_data:
